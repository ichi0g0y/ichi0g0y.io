version: '3'

tasks:
  install:
    desc: 依存関係をインストール
    cmds:
      - bun install

  dev:
    desc: 開発サーバー（Web + Worker API）を同時起動
    deps:
      - install
    cmds:
      - |
        zsh -lc '
        WEB_PORT="$(awk -F= '\''/^APP_ORIGIN=/{print $2}'\'' .dev.vars 2>/dev/null | sed -E '\''s#.*:([0-9]+).*#\1#'\'' | tail -n1)"
        if [ -z "$WEB_PORT" ]; then
          WEB_PORT=5173
        fi
        mkdir -p dist
        bun run worker:dev &
        until nc -z 127.0.0.1 8787 >/dev/null 2>&1; do
          sleep 0.2
        done
        bun run dev -- --port "$WEB_PORT"
        '

  dev-web:
    desc: フロントエンド開発サーバーのみ起動
    deps:
      - install
    cmds:
      - |
        zsh -lc '
        WEB_PORT="$(awk -F= '\''/^APP_ORIGIN=/{print $2}'\'' .dev.vars 2>/dev/null | sed -E '\''s#.*:([0-9]+).*#\1#'\'' | tail -n1)"
        if [ -z "$WEB_PORT" ]; then
          WEB_PORT=5173
        fi
        bun run dev -- --port "$WEB_PORT"
        '

  worker:dev:
    desc: Cloudflare Workers APIをローカル起動
    aliases:
      - worker-dev
    deps:
      - install
    cmds:
      - mkdir -p dist
      - bun run worker:dev

  d1:migrate:local:
    desc: D1マイグレーションをローカル適用
    aliases:
      - d1-migrate-local
    deps:
      - install
    cmds:
      - bun run d1:migrate:local

  d1:migrate:remote:
    desc: D1マイグレーションをリモート適用
    aliases:
      - d1-migrate-remote
    deps:
      - install
    cmds:
      - bun run d1:migrate:remote

  images:backfill:r2:local:
    desc: 既存画像をローカルR2へバックフィル
    aliases:
      - images-backfill-r2-local
    deps:
      - install
    cmds:
      - bun run images:backfill:r2:local

  images:backfill:r2:remote:
    desc: 既存画像をリモートR2へバックフィル
    aliases:
      - images-backfill-r2-remote
    deps:
      - install
    cmds:
      - bun run images:backfill:r2:remote

  images:backfill:r2:local:
    desc: 既存画像をローカルR2へバックフィル
    aliases:
      - images-backfill-r2-local
    deps:
      - install
    cmds:
      - bun run images:backfill:r2:local

  images:backfill:r2:remote:
    desc: 既存画像をリモートR2へバックフィル
    aliases:
      - images-backfill-r2-remote
    deps:
      - install
    cmds:
      - bun run images:backfill:r2:remote

  d1:sync:local-to-remote:
    desc: ローカルD1の gear_items をリモートへ反映（データのみ）
    aliases:
      - d1-sync-local-to-remote
    deps:
      - install
    cmds:
      - mkdir -p .context
      - bunx wrangler d1 export ichi0g0y-io --local --table gear_items --output .context/d1_local_data.sql --no-schema
      - bun run d1:migrate:remote
      - bunx wrangler d1 execute ichi0g0y-io --remote --command "DELETE FROM gear_items; DELETE FROM sqlite_sequence WHERE name='gear_items';"
      - bunx wrangler d1 execute ichi0g0y-io --remote --file .context/d1_local_data.sql

  worker:deploy:
    desc: Workersへデプロイ
    aliases:
      - worker-deploy
    deps:
      - install
    cmds:
      - bun run worker:deploy

  build:
    desc: プロダクションビルド
    deps:
      - install
    cmds:
      - bun run build

  lint:
    desc: ESLintを実行
    deps:
      - install
    cmds:
      - bun run lint

  preview:
    desc: ビルド成果物をプレビュー
    deps:
      - build
    cmds:
      - bun run preview

  env:save:
    desc: Worktreeの環境データを ~/.envs に保存
    cmds:
      - bash ./scripts/sync_workspace_env.sh push

  env:restore:
    desc: ~/.envs の環境データを Worktree に復元
    cmds:
      - bash ./scripts/sync_workspace_env.sh pull

  env:push:prod:remote:
    desc: .prod.vars をCloudflareリモート環境へ反映（secret設定 + deploy）
    deps:
      - build
    cmds:
      - bash ./scripts/push_prod_env_to_remote.sh
