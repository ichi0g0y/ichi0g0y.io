name = "ichi0g0y-portfolio"
main = "worker/index.ts"
compatibility_date = "2026-03-03"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
APP_ORIGIN = "http://localhost:5173"
ALLOWED_GITHUB_LOGINS = "your-github-login,ichi0g0y"
GITHUB_CLIENT_ID = "replace-with-github-oauth-app-client-id"
GITHUB_CLIENT_SECRET = "replace-with-github-oauth-app-client-secret"
ACCESS_TOKEN_SECRET = "dev-only-change-this-secret"

[[d1_databases]]
binding = "DB"
database_name = "ichi0g0y_portfolio"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
