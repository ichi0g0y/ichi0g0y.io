name = "ichi0g0y-io"
main = "worker/index.ts"
compatibility_date = "2026-03-03"
workers_dev = true

[[routes]]
pattern = "ichi0g0y.io"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
APP_ORIGIN = "http://localhost:5173"
ALLOWED_GITHUB_LOGINS = "your-github-login,ichi0g0y"
GITHUB_CLIENT_ID = "replace-with-github-oauth-app-client-id"

[[d1_databases]]
binding = "DB"
database_name = "ichi0g0y-io"
database_id = "211ee884-4858-49f1-9e73-cca7609c6893"
migrations_dir = "migrations"
